name: Docs deploy

# Publish the aggregate Pages site. Build-gated and main-only; the elevated
# pages/OIDC permissions live ONLY on the deploy job, never workflow-global.
on:
  push:
    branches: [main]

# No workflow-global permissions — scope them to the deploy job below.
permissions: {}

# One in-flight deploy at a time; a newer push cancels an older deploy.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read           # checkout needs read; no elevated perms here
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2 (mirrors ci.yml's major)
      - name: Set up Python
        run: uv python install 3.12
      - name: Install
        run: uv pip install --system -e ".[dev]"

      # ── Full gate (inline) ──────────────────────────────────────────
      # The deploy workflow is independent from ci.yml (no cross-workflow
      # needs:), and the owner's first action is `git push` (not a PR),
      # so branch-protection required-checks would not fire. Running the
      # full gate here is the ONLY mechanism that provably prevents
      # publishing a broken or drifted site.
      - name: Tests (incl. doctests)
        run: pytest -q
      - name: Type-check (mypy --strict)
        run: mypy
      - name: Type-check (pyright)
        run: pyright
      - name: Docstring lint (ruff D / Google)
        run: ruff check src/vella/core
      - name: Docstring coverage (interrogate 100%)
        run: interrogate -c pyproject.toml src/vella/core
      - name: Schema breaking-change tripwire
        run: python scripts/export_schema.py --check
      - name: Catalog drift tripwire
        run: python scripts/generate_catalogs.py --check

      # ── Build + stage ───────────────────────────────────────────────
      - name: Build core into site/core (strict)
        run: mkdocs build --strict -d site/core
      # Stage the reviewable static aggregate root above the core subsite.
      - name: Stage aggregate root index.html
        run: cp docs-root/index.html site/index.html
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    needs: build                 # build gate must pass before deploy
    runs-on: ubuntu-latest
    permissions:                 # JOB-SCOPED OIDC — not workflow-global
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
