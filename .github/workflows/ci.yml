name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]  # min floor, mid, latest — matches classifiers
    steps:
      - uses: actions/checkout@v6           # Node 24

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0    # Node 24 (no bare v8 major tag exists)

      # Install into a uv venv (the runner's /usr Python is PEP-668
      # externally-managed, so `uv pip install --system` is refused). Putting
      # .venv/bin on GITHUB_PATH makes the gate tools resolve in later steps.
      # working-directory: packages/vella-core so the venv lands in
      # packages/vella-core/.venv and `.` resolves to the core distribution.
      - name: Install
        working-directory: packages/vella-core
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Tests (incl. type-assertion tests)
        working-directory: packages/vella-core
        run: pytest -q

      - name: Type-check (mypy --strict)
        working-directory: packages/vella-core
        run: mypy

      - name: Type-check (pyright --strict)
        working-directory: packages/vella-core
        run: pyright

      - name: Docstring lint (ruff D / Google convention)
        working-directory: packages/vella-core
        run: ruff check src/vella/core

      - name: Docstring coverage (interrogate 100% public)
        working-directory: packages/vella-core
        run: interrogate -c pyproject.toml src/vella/core

      # Build gate — the API site must render clean from docstrings. The actual
      # Pages publication is a separate workflow (docs-deploy.yml, main-only).
      - name: API docs build (mkdocs --strict)
        working-directory: packages/vella-core
        run: mkdocs build --strict

      - name: Schema breaking-change tripwire
        working-directory: packages/vella-core
        run: python scripts/export_schema.py --check

      - name: Catalog drift tripwire
        working-directory: packages/vella-core
        run: python scripts/generate_catalogs.py --check

  # Runtime distribution. Separate job from `test` (core) so the two gates fail
  # independently. Adds a compat-matrix dimension: runtime declares
  # `vella-core==0.1.*`, so we run its gate against both ends of that range —
  # the FLOOR (`vella-core==0.1.0`) and the LATEST workspace/editable core — to
  # prove the pin holds as core evolves within 0.1.x.
  runtime:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]  # min floor, mid, latest — matches classifiers
        core-version: ["floor", "latest"]          # vella-core==0.1.0 vs. workspace editable
    steps:
      - uses: actions/checkout@v6           # Node 24

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0    # Node 24 (no bare v8 major tag exists)

      # Install into a uv venv (the runner's /usr Python is PEP-668
      # externally-managed, so `uv pip install --system` is refused). Putting
      # .venv/bin on GITHUB_PATH makes the gate tools resolve in later steps.
      # working-directory: packages/vella-runtime so the venv lands there and
      # `.` resolves to the runtime distribution.
      - name: Install (runtime + dev; core via workspace editable)
        working-directory: packages/vella-runtime
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # Compat dimension. `latest` keeps the workspace-editable core installed
      # above. `floor` exercises the PACKAGED core at the pinned floor: build
      # core's wheel and install exactly that (--no-deps, so runtime's own deps
      # are untouched), then run the identical gate against it. While core is at
      # 0.1.0 (unpublished) floor and latest match in content, but this tests the
      # built-artifact install path, not editable source. Once core advances past
      # 0.1.0 (or is published to an index), repoint this at the real floor.
      - name: Pin core to floor (built vella-core==0.1.0 wheel)
        if: matrix.core-version == 'floor'
        working-directory: packages/vella-runtime
        run: |
          uv build --wheel ../vella-core -o ../vella-core/dist
          uv pip install --no-deps --reinstall \
            "vella-core==0.1.0" --find-links ../vella-core/dist

      - name: Tests (incl. deps + determinism)
        working-directory: packages/vella-runtime
        run: pytest -q

      - name: Type-check (mypy --strict)
        working-directory: packages/vella-runtime
        run: mypy

      - name: Type-check (pyright --strict)
        working-directory: packages/vella-runtime
        run: pyright

      - name: Docstring lint (ruff D / Google convention)
        working-directory: packages/vella-runtime
        run: ruff check src/vella/runtime

      - name: Docstring coverage (interrogate 100% public)
        working-directory: packages/vella-runtime
        run: interrogate -c pyproject.toml src/vella/runtime

      # Build gate — the API site must render clean from docstrings. The actual
      # Pages publication is a separate workflow (docs-deploy.yml, main-only).
      - name: API docs build (mkdocs --strict)
        working-directory: packages/vella-runtime
        run: mkdocs build --strict

      - name: Runtime surface breaking-change tripwire
        working-directory: packages/vella-runtime
        run: python scripts/export_runtime_surface.py --check

  # Graph distribution. Separate job from `test` (core) and `runtime` so the
  # gates fail independently. Adds a compat-matrix dimension: graph declares
  # `vella-runtime==0.1.*`, so we run its gate against both ends of that range —
  # the FLOOR (`vella-runtime==0.1.0`) and the LATEST workspace/editable runtime —
  # to prove the pin holds as runtime evolves within 0.1.x.
  graph:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]  # min floor, mid, latest — matches classifiers
        runtime-version: ["floor", "latest"]        # vella-runtime==0.1.0 vs. workspace editable
    steps:
      - uses: actions/checkout@v6           # Node 24

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0    # Node 24 (no bare v8 major tag exists)

      # Install into a uv venv (the runner's /usr Python is PEP-668
      # externally-managed, so `uv pip install --system` is refused). Putting
      # .venv/bin on GITHUB_PATH makes the gate tools resolve in later steps.
      # working-directory: packages/vella-graph so the venv lands there and
      # `.` resolves to the graph distribution.
      - name: Install (graph + dev; runtime + core via workspace editable)
        working-directory: packages/vella-graph
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # Compat dimension. `latest` keeps the workspace-editable runtime installed
      # above. `floor` exercises the PACKAGED runtime at the pinned floor: build
      # runtime's wheel and install exactly that (--no-deps, so graph's own deps
      # are untouched), then run the identical gate against it. While runtime is at
      # 0.1.0 (unpublished) floor and latest match in content, but this tests the
      # built-artifact install path, not editable source. Once runtime advances past
      # 0.1.0 (or is published to an index), repoint this at the real floor.
      - name: Pin runtime to floor (built vella-runtime==0.1.0 wheel)
        if: matrix.runtime-version == 'floor'
        working-directory: packages/vella-graph
        run: |
          uv build --wheel ../vella-runtime -o ../vella-runtime/dist
          uv pip install --no-deps --reinstall \
            "vella-runtime==0.1.0" --find-links ../vella-runtime/dist

      - name: Tests (incl. deps + surface)
        working-directory: packages/vella-graph
        run: pytest -q

      - name: Type-check (mypy --strict)
        working-directory: packages/vella-graph
        run: mypy

      - name: Type-check (pyright --strict)
        working-directory: packages/vella-graph
        run: pyright

      - name: Docstring lint (ruff D / Google convention)
        working-directory: packages/vella-graph
        run: ruff check src/vella/graph

      - name: Docstring coverage (interrogate 100% public)
        working-directory: packages/vella-graph
        run: interrogate -c pyproject.toml src/vella/graph

      # Build gate — the API site must render clean from docstrings. The actual
      # Pages publication is a separate workflow (docs-deploy.yml, main-only).
      - name: API docs build (mkdocs --strict)
        working-directory: packages/vella-graph
        run: mkdocs build --strict

      - name: Graph surface breaking-change tripwire
        working-directory: packages/vella-graph
        run: python scripts/export_graph_surface.py --check

  # Reconciler distribution. Separate job from `test` (core) and `runtime` so the
  # three gates fail independently. Adds a compat-matrix dimension keyed on the
  # reconciler's `vella-runtime==0.1.*` pin: run its gate against both ends of that
  # range — the FLOOR (`vella-runtime==0.1.0`) and the LATEST workspace/editable
  # runtime — to prove the pin holds as runtime evolves within 0.1.x.
  reconciler:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]  # min floor, mid, latest — matches classifiers
        runtime-version: ["floor", "latest"]       # vella-runtime==0.1.0 vs. workspace editable
    steps:
      - uses: actions/checkout@v6           # Node 24

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0    # Node 24 (no bare v8 major tag exists)

      # Install into a uv venv (the runner's /usr Python is PEP-668
      # externally-managed, so `uv pip install --system` is refused). Putting
      # .venv/bin on GITHUB_PATH makes the gate tools resolve in later steps.
      # working-directory: packages/vella-reconciler so the venv lands there and
      # `.` resolves to the reconciler distribution.
      - name: Install (reconciler + dev; runtime + core via workspace editable)
        working-directory: packages/vella-reconciler
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # Compat dimension. `latest` keeps the workspace-editable runtime installed
      # above. `floor` exercises the PACKAGED runtime at the pinned floor: build
      # the runtime wheel and install exactly that (--no-deps, so the reconciler's
      # own deps are untouched), then run the identical gate against it. While
      # runtime is at 0.1.0 (unpublished) floor and latest match in content, but
      # this tests the built-artifact install path, not editable source. Once
      # runtime advances past 0.1.0 (or is published to an index), repoint this at
      # the real floor.
      - name: Pin runtime to floor (built vella-runtime==0.1.0 wheel)
        if: matrix.runtime-version == 'floor'
        working-directory: packages/vella-reconciler
        run: |
          uv build --wheel ../vella-runtime -o ../vella-runtime/dist
          uv pip install --no-deps --reinstall \
            "vella-runtime==0.1.0" --find-links ../vella-runtime/dist

      - name: Tests (incl. deps + import-boundary + surface)
        working-directory: packages/vella-reconciler
        run: pytest -q

      - name: Type-check (mypy --strict)
        working-directory: packages/vella-reconciler
        run: mypy

      - name: Type-check (pyright --strict)
        working-directory: packages/vella-reconciler
        run: pyright

      - name: Docstring lint (ruff D / Google convention)
        working-directory: packages/vella-reconciler
        run: ruff check src/vella/reconciler

      - name: Docstring coverage (interrogate 100% public)
        working-directory: packages/vella-reconciler
        run: interrogate -c pyproject.toml src/vella/reconciler

      # Build gate — the API site must render clean from docstrings. The actual
      # Pages publication is a separate workflow (docs-deploy.yml, main-only).
      - name: API docs build (mkdocs --strict)
        working-directory: packages/vella-reconciler
        run: mkdocs build --strict

      - name: Reconciler surface breaking-change tripwire
        working-directory: packages/vella-reconciler
        run: python scripts/export_reconciler_surface.py --check

  agent:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]  # min floor, mid, latest — matches classifiers
        deps-version: ["floor", "latest"]           # core/runtime/graph==0.1.0 vs. workspace editable
    steps:
      - uses: actions/checkout@v6           # Node 24

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0    # Node 24 (no bare v8 major tag exists)

      # Install into a uv venv (the runner's /usr Python is PEP-668
      # externally-managed, so `uv pip install --system` is refused). Putting
      # .venv/bin on GITHUB_PATH makes the gate tools resolve in later steps.
      # working-directory: packages/vella-agent so the venv lands there and
      # `.` resolves to the agent distribution.
      - name: Install (agent + dev; core + runtime + graph via workspace editable)
        working-directory: packages/vella-agent
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # Compat dimension. `latest` keeps the workspace-editable core/runtime/graph
      # installed above. `floor` exercises the PACKAGED siblings at the pinned
      # floor: build each sibling's wheel and install exactly that (--no-deps, so
      # the agent's own deps are untouched), then run the identical gate against
      # them. While the siblings are at 0.1.0 (unpublished) floor and latest match
      # in content, but this tests the built-artifact install path, not editable
      # source. Once a sibling advances past 0.1.0 (or is published to an index),
      # repoint this at the real floor. Build graph LAST so its --no-deps install
      # does not get its own core/runtime pins clobbered.
      - name: Pin core + runtime + graph to floor (built 0.1.0 wheels)
        if: matrix.deps-version == 'floor'
        working-directory: packages/vella-agent
        run: |
          uv build --wheel ../vella-core -o ../vella-core/dist
          uv build --wheel ../vella-runtime -o ../vella-runtime/dist
          uv build --wheel ../vella-graph -o ../vella-graph/dist
          uv pip install --no-deps --reinstall \
            "vella-core==0.1.0" --find-links ../vella-core/dist
          uv pip install --no-deps --reinstall \
            "vella-runtime==0.1.0" --find-links ../vella-runtime/dist
          uv pip install --no-deps --reinstall \
            "vella-graph==0.1.0" --find-links ../vella-graph/dist

      - name: Tests (incl. deps + import-boundary + determinism + surface)
        working-directory: packages/vella-agent
        run: pytest -q

      - name: Type-check (mypy --strict)
        working-directory: packages/vella-agent
        run: mypy

      - name: Type-check (pyright --strict)
        working-directory: packages/vella-agent
        run: pyright

      - name: Docstring lint (ruff D / Google convention)
        working-directory: packages/vella-agent
        run: ruff check src/vella/agent

      - name: Docstring coverage (interrogate 100% public)
        working-directory: packages/vella-agent
        run: interrogate -c pyproject.toml src/vella/agent

      # Build gate — the API site must render clean from docstrings. The actual
      # Pages publication is a separate workflow (docs-deploy.yml, main-only).
      - name: API docs build (mkdocs --strict)
        working-directory: packages/vella-agent
        run: mkdocs build --strict

      - name: Agent surface breaking-change tripwire
        working-directory: packages/vella-agent
        run: python scripts/export_agent_surface.py --check
