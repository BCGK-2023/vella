[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vella-core"
version = "0.1.0"
description = "Pure-data core model (Node, Edge, references, state, tools) for the Vella graph SDK."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
authors = [{ name = "Vella" }]
keywords = ["graph", "knowledge-graph", "agents", "pydantic", "sdk"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.6",
    "typing_extensions>=4.7",  # PEP 696 TypeVar defaults below 3.13
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "hypothesis>=6.100",  # property-based fuzzing of the "parse_* never throws" invariant
    "mypy>=1.10",
    "pyright>=1.1.360",
    # --- docs toolchain (dev-only; the runtime stays pydantic + typing_extensions) ---
    "ruff>=0.5",                  # docstring-convention enforcement (pydocstyle D rules)
    "interrogate>=1.7",           # docstring-coverage gate over the public surface
    "mkdocs>=1.6",                # static site generator
    "mkdocstrings[python]>=0.25",  # API reference generated from docstrings + type hints
    "mkdocs-material>=9.5",       # theme (nav/search/version built-ins)
]

[project.urls]
Homepage = "https://github.com/vella/vella"
Source = "https://github.com/vella/vella"

# --- Namespace package: src/vella has no __init__; vella.core is the package ---
[tool.hatch.build.targets.wheel]
packages = ["src/vella"]

[tool.hatch.build.targets.wheel.force-include]
"src/vella/core/py.typed" = "vella/core/py.typed"

[tool.hatch.build.targets.sdist]
include = ["src/vella", "tests", "schema", "scripts", "DESIGN.md", "README.md", "LICENSE"]

# --- Tooling ---
[tool.pytest.ini_options]
# Doctests are first-class: README + every public docstring example is executed,
# so documentation cannot silently rot (mirrors the export_schema.py --check posture).
# `--doctest-modules` scans the public package; the root conftest excludes private
# (underscore) modules. README.md is listed explicitly so `--doctest-glob` picks it up.
testpaths = ["tests", "src/vella/core", "README.md"]
addopts = "--doctest-glob=*.md --doctest-modules"
filterwarnings = ["error::UserWarning"]  # edge-type typo warnings must be explicit in tests

[tool.mypy]
python_version = "3.11"
strict = true
mypy_path = "src"
explicit_package_bases = true
namespace_packages = true
files = ["src/vella/core", "tests"]
plugins = ["pydantic.mypy"]

[tool.pyright]
# pyright strict guards the shipped contract (src); mypy strict additionally
# covers tests. Both run on the public types — that's where catching
# checker-divergence pays off — without fighting pyright-strict's noise on
# raw-JSON test fixtures.
include = ["src"]
typeCheckingMode = "strict"
pythonVersion = "3.11"

# --- Docstring convention (Google), enforced only on the shipped public package ---
[tool.ruff]
# Ruff here governs docstrings only; it is not (yet) the formatter/linter of record.
# Scope to the package whose docstrings render on the API site.
src = ["src"]

[tool.ruff.lint]
select = ["D"]  # pydocstyle: docstring presence + Google-convention compliance

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
# Tests and build scripts are not part of the rendered public API surface.
"tests/**" = ["D"]
"scripts/**" = ["D"]
"conftest.py" = ["D"]

# --- Docstring coverage gate over the public surface (the __all__ symbols) ---
[tool.interrogate]
# fail-under = 100 over the public-only scope means every public symbol is
# documented; private/underscore symbols are out of scope (not part of the API).
fail-under = 100
ignore-private = true
ignore-semiprivate = true
ignore-nested-functions = true
ignore-magic = true
ignore-module = false
# Scope is passed on the CLI (`interrogate src/vella/core`); tests/scripts excluded.
