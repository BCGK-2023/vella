name: Docs deploy

# Publish the aggregate Pages site. Build-gated and main-only; the elevated
# pages/OIDC permissions live ONLY on the deploy job, never workflow-global.
on:
  push:
    branches: [main]

# No workflow-global permissions — scope them to the deploy job below.
permissions: {}

# One in-flight deploy at a time; a newer push cancels an older deploy.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read           # checkout needs read; no elevated perms here
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3 (Node 24)
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0 (Node 24; mirrors ci.yml's major)
      # Install into a uv venv (mirrors local dev). The runner's /usr Python is
      # PEP-668 externally-managed, so `uv pip install --system` is refused;
      # putting .venv/bin on GITHUB_PATH makes the gate tools resolve in later steps.
      # working-directory: packages/vella-core so the venv lands in
      # packages/vella-core/.venv and `.` resolves to the core distribution.
      - name: Install
        working-directory: packages/vella-core
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # ── Full gate (inline) ──────────────────────────────────────────
      # The deploy workflow is independent from ci.yml (no cross-workflow
      # needs:), and the owner's first action is `git push` (not a PR),
      # so branch-protection required-checks would not fire. Running the
      # full gate here is the ONLY mechanism that provably prevents
      # publishing a broken or drifted site.
      - name: Tests (incl. doctests)
        working-directory: packages/vella-core
        run: pytest -q
      - name: Type-check (mypy --strict)
        working-directory: packages/vella-core
        run: mypy
      - name: Type-check (pyright)
        working-directory: packages/vella-core
        run: pyright
      - name: Docstring lint (ruff D / Google)
        working-directory: packages/vella-core
        run: ruff check src/vella/core
      - name: Docstring coverage (interrogate 100%)
        working-directory: packages/vella-core
        run: interrogate -c pyproject.toml src/vella/core
      - name: Schema breaking-change tripwire
        working-directory: packages/vella-core
        run: python scripts/export_schema.py --check
      - name: Catalog drift tripwire
        working-directory: packages/vella-core
        run: python scripts/generate_catalogs.py --check

      # ── Build + stage ───────────────────────────────────────────────
      # Build runs from packages/vella-core (so the venv's mkdocs is on PATH and
      # mkdocstrings paths:[src] resolves), but emits to the repo-root site/ via
      # an absolute -d so the aggregate landing can be staged alongside it.
      - name: Build core into site/core (strict)
        working-directory: packages/vella-core
        run: mkdocs build --strict -d "$GITHUB_WORKSPACE/site/core"
      # Stage the reviewable static aggregate root above the core subsite.
      - name: Stage aggregate root index.html
        run: cp "$GITHUB_WORKSPACE/docs-root/index.html" "$GITHUB_WORKSPACE/site/index.html"
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    needs: build                 # build gate must pass before deploy
    runs-on: ubuntu-latest
    permissions:                 # JOB-SCOPED OIDC — not workflow-global
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
