name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]  # min floor + latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install
        run: uv pip install --system -e ".[dev]"

      - name: Tests (incl. type-assertion tests)
        run: pytest -q

      - name: Type-check (mypy --strict)
        run: mypy

      - name: Type-check (pyright --strict)
        run: pyright

      - name: Schema breaking-change tripwire
        run: python scripts/export_schema.py --check
