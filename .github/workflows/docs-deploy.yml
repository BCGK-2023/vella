name: Docs deploy

# Publish the aggregate Pages site. Build-gated and main-only; the elevated
# pages/OIDC permissions live ONLY on the final deploy job, never workflow-global.
#
# The published set is DISCOVERED, not hardcoded: every package that ships a
# `packages/*/mkdocs.yml` becomes a subsite at `…/vella/<slug>/` (slug = the
# `src/vella/<slug>` package dir). Adding a package to the live site is therefore
# zero-config — it appears the moment its mkdocs.yml lands on main. The pipeline
# is four jobs:
#   discover  → emit the package matrix from scripts/docs_packages.py
#   build     → one matrix leg per package: full inline gate + `mkdocs build`
#   assemble  → stitch the subsites + generate the landing (no elevated perms)
#   deploy    → the ONLY job holding pages/OIDC perms; runs deploy-pages alone
on:
  push:
    branches: [main]

# No workflow-global permissions — scope them to the deploy job below.
permissions: {}

# One in-flight deploy at a time; a newer push cancels an older deploy.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  # ── Discover ────────────────────────────────────────────────────────────
  # Project the publishable-package set (sorted, deterministic) into a matrix.
  # Stdlib-only script; the runner's preinstalled python3 is enough — no uv here.
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3 (Node 24)
      - id: set
        name: Discover publishable packages (every packages/*/mkdocs.yml)
        run: python3 scripts/docs_packages.py --matrix >> "$GITHUB_OUTPUT"

  # ── Build (one leg per package) ───────────────────────────────────────────
  # Each leg installs its package, runs that package's gate steps inline, and
  # builds its subsite into site/<slug>. The deploy workflow is independent from
  # ci.yml (no cross-workflow needs:, and the first action on a push is not a PR
  # so required-checks would not fire), so this inline gate is the ONLY mechanism
  # that provably prevents publishing a broken or drifted subsite. It runs the
  # gate STEPS of that package's ci.yml job on a single representative Python
  # (3.12); the Python-version and core-floor COMPAT MATRIX stays ci.yml's job
  # (it runs on every push/PR) — the site build + drift tripwires here are
  # version-insensitive, so a single cell is the right publish gate. fail-fast is
  # off so every package reports independently; but a single failing leg fails
  # `build` and blocks the (atomic) Pages deploy — fail-closed by construction.
  build:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3 (Node 24)
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0 (Node 24; mirrors ci.yml)
      # Install into a uv venv (the runner's /usr Python is PEP-668
      # externally-managed, so `uv pip install --system` is refused). Putting
      # .venv/bin on GITHUB_PATH makes the gate tools resolve in later steps.
      # working-directory keeps the venv in the package dir and resolves `.` to
      # this distribution; workspace siblings install editable automatically.
      - name: Install (${{ matrix.pkg.dir }} + dev; siblings via workspace editable)
        working-directory: packages/${{ matrix.pkg.dir }}
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # Self-sufficient gate — the gate steps of this package's ci.yml job (on
      # this single Python), then the strict site build. Emits to the repo-root
      # site/<slug> via an absolute -d so the assemble job can stitch every
      # subsite together.
      - name: Gate + build subsite (${{ matrix.pkg.slug }})
        working-directory: packages/${{ matrix.pkg.dir }}
        run: |
          set -euo pipefail
          pytest -q
          mypy
          pyright
          ruff check "src/vella/${{ matrix.pkg.slug }}"
          interrogate -c pyproject.toml "src/vella/${{ matrix.pkg.slug }}"
          # Every scripts/*.py is a --check-able drift tripwire (schema / surface /
          # catalog projections of live code). Run them all; none may drift.
          if compgen -G "scripts/*.py" > /dev/null; then
            for s in scripts/*.py; do
              echo "::group::drift $s"
              python "$s" --check
              echo "::endgroup::"
            done
          fi
          mkdocs build --strict -d "$GITHUB_WORKSPACE/site/${{ matrix.pkg.slug }}"

      - name: Upload subsite artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: subsite-${{ matrix.pkg.slug }}
          path: site/${{ matrix.pkg.slug }}
          if-no-files-found: error

  # ── Assemble ──────────────────────────────────────────────────────────────
  # Stitch every subsite into site/<slug> and GENERATE the aggregate landing
  # from the same discovery the matrix used (so the landing and the published
  # subsites can never disagree). No elevated permissions here — this job only
  # produces the Pages artifact; it cannot deploy.
  assemble:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3 (Node 24)
      # v4 default (merge-multiple unset): each matched artifact lands in its own
      # _subsites/<artifact-name>/ dir — i.e. _subsites/subsite-<slug>/. The
      # assemble step below relies on that layout; do NOT set merge-multiple.
      - name: Download all subsite artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: _subsites
          pattern: subsite-*
      - name: Assemble site tree + generate landing
        run: |
          set -euo pipefail
          mkdir -p site
          for d in _subsites/subsite-*; do
            slug="${d#_subsites/subsite-}"
            mkdir -p "site/$slug"
            cp -R "$d/." "site/$slug/"
          done
          python3 scripts/docs_packages.py --landing site/index.html
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  # ── Deploy ──────────────────────────────────────────────────────────────
  # The ONLY job with pages/OIDC permissions; it runs deploy-pages and nothing
  # else, so the elevated grant is consumed solely by the publish step.
  deploy:
    needs: assemble
    runs-on: ubuntu-latest
    permissions:                 # JOB-SCOPED OIDC — not workflow-global
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
