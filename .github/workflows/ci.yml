name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]  # min floor, mid, latest — matches classifiers
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Install into a uv venv (the runner's /usr Python is PEP-668
      # externally-managed, so `uv pip install --system` is refused). Putting
      # .venv/bin on GITHUB_PATH makes the gate tools resolve in later steps.
      - name: Install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Tests (incl. type-assertion tests)
        run: pytest -q

      - name: Type-check (mypy --strict)
        run: mypy

      - name: Type-check (pyright --strict)
        run: pyright

      - name: Docstring lint (ruff D / Google convention)
        run: ruff check src/vella/core

      - name: Docstring coverage (interrogate 100% public)
        run: interrogate -c pyproject.toml src/vella/core

      # Build gate — the API site must render clean from docstrings. The actual
      # Pages publication is a separate workflow (docs-deploy.yml, main-only).
      - name: API docs build (mkdocs --strict)
        run: mkdocs build --strict

      - name: Schema breaking-change tripwire
        run: python scripts/export_schema.py --check

      - name: Catalog drift tripwire
        run: python scripts/generate_catalogs.py --check
